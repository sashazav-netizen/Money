<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול כספי הבית</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #2c3e50;
            --income: #27ae60;
            --expense: #e74c3c;
            --fixed: #f39c12;
            --border-color: #ddd;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; padding: 10px; color: #333; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        .container { max-width: 1100px; margin: 0 auto; width: 100%; height: 100%; display: flex; flex-direction: column; }

        header { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 10px 0; }
        .header-icon { width: 35px; height: 35px; }
        h1 { margin: 0; font-size: 1.6rem; color: var(--primary); }

        .month-nav {
            display: flex; justify-content: center; align-items: center; gap: 20px;
            background: var(--primary); color: white; padding: 8px; border-radius: 8px; margin-bottom: 10px;
        }
        .nav-btn { background: rgba(255,255,255,0.2); border: none; color: white; cursor: pointer; padding: 5px 15px; border-radius: 4px; font-weight: bold; }
        .nav-btn:hover { background: rgba(255,255,255,0.3); }

        .grid { display: grid; grid-template-columns: 300px 1fr; gap: 15px; flex-grow: 1; overflow: hidden; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 10px; }
        .card h3 { margin: 0 0 12px 0; font-size: 1rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }

        .balance-display { border: 2px solid var(--primary); text-align: center; padding: 15px; border-radius: 10px; margin-bottom: 15px; background: white; }
        .balance-val { font-size: 1.5rem; font-weight: bold; color: var(--primary); display: block; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        input, select, button { padding: 8px; border: 1px solid var(--border-color); border-radius: 5px; font-size: 13px; }
        .btn-submit { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }

        .list-section { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .scroll-area { flex-grow: 1; overflow-y: auto; padding-left: 5px; }
        .item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px; margin-bottom: 5px; background: #fff; border-radius: 6px; 
            border-right: 5px solid #ccc; font-size: 13px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .income { border-right-color: var(--income); }
        .expense { border-right-color: var(--expense); }
        .fixed { border-right-color: var(--fixed); }

        .progress-bg { background: #eee; border-radius: 10px; height: 8px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; transition: width 0.4s ease; background: var(--fixed); }
        .chart-box { height: 160px; margin-top: 10px; }

        footer { text-align: center; font-size: 11px; color: #888; padding: 10px; }

        @media (max-width: 768px) { body { overflow: auto; height: auto; } .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" class="header-icon">
        <h1>ניהול כספי הבית</h1>
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135706.png" class="header-icon">
    </header>

    <div class="month-nav">
        <button class="nav-btn" onclick="moveMonth(-1)">◀</button>
        <span id="monthTitle" style="font-weight: bold; min-width: 120px; text-align: center;"></span>
        <button class="nav-btn" onclick="moveMonth(1)">▶</button>
    </div>

    <div class="grid">
        <aside>
            <div class="balance-display">
                <span style="font-size: 0.8rem; color: #666;">יתרה חודשית</span>
                <span id="balanceVal" class="balance-val">₪ 0</span>
            </div>

            <div class="card">
                <h3>הוספת תנועה</h3>
                <div class="form-grid">
                    <input type="text" id="desc" placeholder="תיאור" class="full-width">
                    <input type="number" id="amt" placeholder="סכום">
                    <select id="type">
                        <option value="income">הכנסה</option>
                        <option value="expense">הוצאה</option>
                        <option value="fixed">קבועה</option>
                    </select>
                    <button class="btn-submit full-width" onclick="addItem()">הוסף למערכת</button>
                </div>
            </div>

            <div class="card">
                <h3>ניתוח נטל קבוע</h3>
                <div style="font-size: 12px;">
                    אחוז מההכנסה: <span id="fixedText" style="font-weight:bold">0%</span>
                    <div class="progress-bg"><div id="fixedProgress" class="progress-fill"></div></div>
                </div>
                <div class="chart-box"><canvas id="mainChart"></canvas></div>
                <div style="display:flex; gap:5px; margin-top:15px;">
                    <button onclick="exportData()" style="flex:1; font-size:10px; cursor:pointer; padding:5px; border:1px solid #ccc; background:#f9f9f9;">ייצוא</button>
                    <button onclick="document.getElementById('fileIn').click()" style="flex:1; font-size:10px; cursor:pointer; padding:5px; border:1px solid #ccc; background:#f9f9f9;">ייבוא</button>
                    <input type="file" id="fileIn" style="display:none" onchange="importData(event)">
                </div>
            </div>
        </aside>

        <main class="list-section">
            <div class="card" style="height: 100%; display: flex; flex-direction: column;">
                <h3>פירוט תנועות - <span id="labelMonth"></span></h3>
                <div id="list" class="scroll-area"></div>
            </div>
        </main>
    </div>

    <footer>&copy; 2026 אלכסנדר זבודיסקר - ניהול תקציב חכם</footer>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('budget_db')) || [];
    let viewDate = new Date();
    let chart;

    function initChart() {
        chart = new Chart(document.getElementById('mainChart'), {
            type: 'doughnut',
            data: { labels: ['הכנסה', 'הוצאה', 'קבועה'], datasets: [{ data: [0,0,0], backgroundColor: ['#27ae60','#e74c3c','#f39c12'], borderWidth: 1 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } }, cutout: '70%' }
        });
    }

    function addItem() {
        const d = document.getElementById('desc'), a = document.getElementById('amt'), t = document.getElementById('type');
        if(!d.value || !a.value) return;
        data.push({ id: Date.now(), desc: d.value, amt: parseFloat(a.value), type: t.value, date: viewDate.toISOString() });
        save();
        d.value = ''; a.value = '';
    }

    function deleteItem(id) { data = data.filter(i => i.id !== id); save(); }
    function moveMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); render(); }
    function save() { localStorage.setItem('budget_db', JSON.stringify(data)); render(); }

    function render() {
        const months = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
        const m = viewDate.getMonth(), y = viewDate.getFullYear();
        
        document.getElementById('monthTitle').innerText = `${months[m]} ${y}`;
        document.getElementById('labelMonth').innerText = months[m];

        const currentData = data.filter(i => { const d = new Date(i.date); return d.getMonth() === m && d.getFullYear() === y; });
        const list = document.getElementById('list');
        list.innerHTML = '';
        
        let totals = { income: 0, expense: 0, fixed: 0 };

        currentData.reverse().forEach(i => {
            totals[i.type] += i.amt;
            list.innerHTML += `
                <div class="item ${i.type}">
                    <span>${i.desc}</span>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span dir="ltr" style="font-weight:bold">${i.type==='income'?'+':'-'} ₪${i.amt.toLocaleString()}</span>
                        <button onclick="deleteItem(${i.id})" style="border:none; background:none; cursor:pointer; color:#ddd">🗑</button>
                    </div>
                </div>`;
        });

        const bal = totals.income - (totals.expense + totals.fixed);
        const balEl = document.getElementById('balanceVal');
        balEl.innerText = `₪ ${bal.toLocaleString()}`;
        balEl.style.color = bal < 0 ? 'var(--expense)' : 'var(--primary)';
        
        chart.data.datasets[0].data = [totals.income, totals.expense, totals.fixed];
        chart.update();

        const fixP = totals.income > 0 ? Math.floor((totals.fixed/totals.income)*100) : 0;
        document.getElementById('fixedText').innerText = fixP + '%';
        document.getElementById('fixedProgress').style.width = Math.min(fixP, 100) + '%';
    }

    function exportData() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(data)]));
        a.download = "budget_backup.json"; a.click();
    }
    function importData(e) {
        const r = new FileReader();
        r.onload = (ev) => { data = JSON.parse(ev.target.result); save(); };
        r.readAsText(e.target.files[0]);
    }

    initChart(); render();
</script>

</body>
</html>
