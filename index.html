<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול כספי הבית - גרסה מלאה</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --primary: #34495e;
            --income-color: #27ae60;
            --expense-color: #e74c3c;
            --fixed-color: #f39c12;
            --savings-color: #3498db;
            --text-main: #2c3e50;
            --error-color: #d63031;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            color: var(--text-main);
            font-size: 14px;
        }

        .main-container { max-width: 1000px; margin: 0 auto; }
        h1 { font-size: 1.5rem; text-align: center; margin: 10px 0; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }

        .card h3 { margin-top: 0; font-size: 1rem; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 12px; }

        .balance-box {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        /* התראת הוצאות קבועות */
        .stat-badge {
            display: block;
            padding: 8px;
            border-radius: 6px;
            background: #f8f9fa;
            border: 1px solid #eee;
            margin-top: 5px;
            font-size: 12px;
        }

        .progress-container {
            background: #eee;
            border-radius: 10px;
            height: 8px;
            width: 100%;
            margin: 8px 0;
            overflow: hidden;
        }
        .progress-bar { height: 100%; width: 0%; transition: width 0.5s ease; }
        .bg-savings { background: var(--savings-color); }
        .bg-fixed { background: var(--fixed-color); }

        .input-stack { display: flex; flex-direction: column; gap: 8px; }
        
        input, select, button {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 13px;
        }

        input.error { border-color: var(--error-color); background-color: #fff5f5; }
        #error-msg { color: var(--error-color); font-size: 11px; display: none; margin-bottom: 5px; }

        .btn-add { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 5px; }

        .transaction-list { max-height: 500px; overflow-y: auto; }

        .transaction-item {
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: center;
            padding: 6px 10px;
            margin-bottom: 4px;
            border-radius: 4px;
            background: #fff;
            border-right: 4px solid #ccc;
        }

        .item-income { border-right-color: var(--income-color); }
        .item-expense { border-right-color: var(--expense-color); }
        .item-fixed { border-right-color: var(--fixed-color); }

        .amount-text { font-weight: bold; margin-right: 10px; min-width: 75px; text-align: left; }
        .delete-btn { background: none; border: none; color: #ddd; cursor: pointer; font-size: 16px; transition: color 0.2s; }
        .delete-btn:hover { color: var(--expense-color); }

        .chart-wrapper { width: 100%; height: 160px; }
        .actions { display: flex; gap: 5px; margin-top: 10px; }
        .btn-small { flex: 1; padding: 4px; font-size: 10px; background: #eee; cursor: pointer; border: 1px solid #ddd; }

        footer { text-align: center; margin-top: 30px; font-size: 11px; color: #999; border-top: 1px solid #ddd; padding: 15px; }

        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="main-container">
    <h1>ניהול כספי הבית</h1>

    <div class="dashboard-grid">
        <aside>
            <div class="balance-box">
                <div style="font-size: 0.85em; opacity: 0.9;">יתרה נוכחית</div>
                <div id="total-balance" style="font-size: 1.4em; font-weight: bold;">₪ 0</div>
            </div>

            <div class="card">
                <h3>יעדים וניתוח</h3>
                
                <div style="margin-bottom: 15px;">
                    <div style="display:flex; justify-content: space-between; font-size: 12px;">
                        <span>יעד חיסכון</span>
                        <input type="number" id="savings-goal-input" placeholder="הגדר יעד" onchange="updateSavingsGoal()" style="width: 70px; padding: 2px;">
                    </div>
                    <div class="progress-container">
                        <div id="savings-progress" class="progress-bar bg-savings"></div>
                    </div>
                    <div id="savings-status" style="font-size: 10px; color: #666;">0% מהיעד</div>
                </div>

                <div class="stat-badge" id="fixed-analysis">
                    <div>נטל הוצאות קבועות:</div>
                    <div class="progress-container">
                        <div id="fixed-progress" class="progress-bar bg-fixed"></div>
                    </div>
                    <div id="fixed-status" style="font-weight: bold; font-size: 11px;">0% מההכנסות</div>
                </div>
            </div>

            <div class="card">
                <h3>הוספה מהירה</h3>
                <div id="error-msg">⚠️ חסרים פרטים</div>
                <div class="input-stack">
                    <input type="text" id="desc" placeholder="תיאור">
                    <input type="number" id="amount" placeholder="סכום">
                    <select id="type">
                        <option value="income">הכנסה</option>
                        <option value="expense">הוצאה</option>
                        <option value="fixed">הוצאה קבועה</option>
                    </select>
                    <button class="btn-add" onclick="addTransaction()">הוסף</button>
                </div>
                <div class="actions">
                    <button class="btn-small" onclick="exportToFile()">ייצוא</button>
                    <button class="btn-small" onclick="document.getElementById('fileInput').click()">ייבוא</button>
                    <input type="file" id="fileInput" style="display:none" onchange="importFromFile(event)">
                </div>
            </div>

            <div class="card">
                <div class="chart-wrapper"><canvas id="budgetChart"></canvas></div>
            </div>
        </aside>

        <main>
            <div class="card" style="min-height: 570px;">
                <h3>פירוט תנועות</h3>
                <div id="list" class="transaction-list"></div>
            </div>
        </main>
    </div>

    <footer>
        &copy; 2026 כל הזכויות שמורות - אלכסנדר זבודיסקר
    </footer>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('home_budget_data')) || [];
    let savingsGoal = parseFloat(localStorage.getItem('home_budget_goal')) || 0;
    let myChart = null;

    function initChart() {
        const ctx = document.getElementById('budgetChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['הכנסות', 'הוצאות', 'קבועות'],
                datasets: [{
                    data: [0, 0, 0],
                    backgroundColor: ['#27ae60', '#e74c3c', '#f39c12'],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom', labels: { boxWidth: 8, font: { size: 10 } } } },
                cutout: '75%'
            }
        });
    }

    function updateSavingsGoal() {
        savingsGoal = parseFloat(document.getElementById('savings-goal-input').value) || 0;
        localStorage.setItem('home_budget_goal', savingsGoal);
        updateUI();
    }

    function addTransaction() {
        const d = document.getElementById('desc');
        const a = document.getElementById('amount');
        const err = document.getElementById('error-msg');
        
        if (!d.value.trim() || isNaN(parseFloat(a.value)) || parseFloat(a.value) <= 0) {
            err.style.display = 'block';
            d.classList.toggle('error', !d.value.trim());
            a.classList.toggle('error', isNaN(parseFloat(a.value)));
            return;
        }

        err.style.display = 'none';
        d.classList.remove('error'); a.classList.remove('error');

        transactions.push({ id: Date.now(), desc: d.value.trim(), amount: parseFloat(a.value), type: document.getElementById('type').value });
        saveAndRefresh();
        d.value = ''; a.value = '';
    }

    function deleteTransaction(id) {
        transactions = transactions.filter(t => t.id !== id);
        saveAndRefresh();
    }

    function saveAndRefresh() {
        localStorage.setItem('home_budget_data', JSON.stringify(transactions));
        updateUI();
    }

    function updateUI() {
        const list = document.getElementById('list');
        list.innerHTML = '';
        let totals = { income: 0, expense: 0, fixed: 0 };

        transactions.slice().reverse().forEach(t => {
            totals[t.type] += t.amount;
            const li = document.createElement('div');
            li.className = `transaction-item item-${t.type}`;
            li.innerHTML = `
                <span>${t.desc}</span>
                <span class="amount-text" dir="ltr">${t.type === 'income' ? '+' : '-'} ₪${t.amount.toLocaleString()}</span>
                <button class="delete-btn" onclick="deleteTransaction(${t.id})">🗑</button>
            `;
            list.appendChild(li);
        });

        const balance = totals.income - (totals.expense + totals.fixed);
        document.getElementById('total-balance').innerText = `₪ ${balance.toLocaleString()}`;

        // עדכון יעד חיסכון
        document.getElementById('savings-goal-input').value = savingsGoal || '';
        if (savingsGoal > 0) {
            const perc = Math.min(Math.max((balance / savingsGoal) * 100, 0), 100);
            document.getElementById('savings-progress').style.width = perc + '%';
            document.getElementById('savings-status').innerText = `${Math.floor(perc)}% הושג`;
        }

        // עדכון ניתוח הוצאות קבועות
        if (totals.income > 0) {
            const fixedPerc = Math.min((totals.fixed / totals.income) * 100, 100);
            document.getElementById('fixed-progress').style.width = fixedPerc + '%';
            document.getElementById('fixed-status').innerText = `${Math.floor(fixedPerc)}% מההכנסה`;
            document.getElementById('fixed-status').style.color = fixedPerc > 50 ? 'var(--expense-color)' : 'var(--text-main)';
        }

        if (myChart) {
            myChart.data.datasets[0].data = [totals.income, totals.expense, totals.fixed];
            myChart.update();
        }
    }

    function exportToFile() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(transactions)]));
        a.download = "budget.json"; a.click();
    }

    function importFromFile(e) {
        const r = new FileReader();
        r.onload = (ev) => { transactions = JSON.parse(ev.target.result); saveAndRefresh(); };
        r.readAsText(e.target.files[0]);
    }

    initChart(); updateUI();
</script>

</body>
</html>
