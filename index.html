<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>ניהול תקציב ביתי - אלכסנדר 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070b14;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --income: #22c55e;
            --expense: #ef4444;
            --fixed: #f59e0b;
            --balance: #38bdf8;
            --accent: #38bdf8;
        }

        html, body { max-width: 100%; overflow-x: hidden; margin: 0; padding: 0; }
        * { box-sizing: border-box; font-family: 'Heebo', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #1e293b, #070b14);
            background-attachment: fixed;
            color: var(--text); padding: 15px; direction: rtl; min-height: 100vh;
        }

        .container { max-width: 600px; margin: auto; }

        header { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 20px 0 25px 0; }
        .header-icon { width: 42px; height: 42px; filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.5)); }
        .coin-svg { fill: #f59e0b; animation: coinSpin 4s infinite linear; }
        @keyframes coinSpin { 0%, 100% { transform: rotateY(0deg); } 50% { transform: rotateY(180deg); } }

        h1 { font-size: 1.8rem; font-weight: 900; color: var(--text); margin: 0; }
        h1 span { color: var(--accent); }

        .summary-mini { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .mini-card { background: var(--glass); backdrop-filter: blur(12px); padding: 12px 2px; border-radius: 14px; text-align: center; border: 1px solid var(--glass-border); transition: 0.3s; }
        .mini-card span { display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 4px; }
        .mini-card b { font-size: 0.9rem; white-space: nowrap; }
        .mini-card.highlight { border: 1px solid var(--balance); background: rgba(56, 189, 248, 0.1); transform: scale(1.05); }

        .chart-section { background: var(--glass); backdrop-filter: blur(12px); padding: 15px; border-radius: 20px; margin-bottom: 25px; border: 1px solid var(--glass-border); display: flex; justify-content: center; }
        .chart-container { height: 90px; width: 140px; }

        .filter-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .filter-btn { 
            background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-dim); 
            padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: 0.3s;
        }
        .filter-btn.active { background: var(--accent); color: var(--bg); font-weight: 700; border-color: var(--accent); }

        .form-card { background: var(--glass); backdrop-filter: blur(12px); padding: 15px; border-radius: 18px; margin-bottom: 25px; border: 1px solid var(--glass-border); }
        .input-group { display: flex; gap: 8px; flex-wrap: wrap; }
        input, select, .btn-main { padding: 10px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(15, 23, 42, 0.6); color: white; outline: none; font-size: 0.9rem; }
        input { flex: 2; min-width: 120px; }
        select { flex: 1; min-width: 100px; cursor: pointer; }
        .btn-main { background: var(--accent); color: var(--bg); font-weight: 900; cursor: pointer; border: none; flex: 1; transition: 0.2s; }

        .list-container { border-radius: 18px; margin-bottom: 30px; }
        .item { 
            background: var(--glass); backdrop-filter: blur(8px); margin-bottom: 8px; 
            display: flex; justify-content: space-between; padding: 12px 15px; 
            border-radius: 12px; border: 1px solid var(--glass-border); align-items: center;
        }
        .item.income { border-right: 4px solid var(--income); }
        .item.expense { border-right: 4px solid var(--expense); }
        .item.fixed { border-right: 4px solid var(--fixed); }

        .actions-bottom { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding-bottom: 20px; }
        .action-btn { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-dim); padding: 8px 14px; border-radius: 10px; cursor: pointer; font-size: 0.8rem; transition: 0.3s; }
        .action-btn.refresh { background: rgba(56, 189, 248, 0.15); color: var(--accent); border-color: var(--accent); }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150px); background: var(--expense); color: white; padding: 12px 25px; border-radius: 12px; z-index: 10000; transition: 0.5s; opacity: 0; font-weight: 700; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* מודלים בעיצוב Glassmorphism */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 10001; }
        .modal { background: var(--glass); border: 1px solid var(--glass-border); padding: 25px; border-radius: 20px; width: 90%; max-width: 320px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal h3 { margin-bottom: 10px; font-size: 1.3rem; }
        .modal p { color: var(--text-dim); margin-bottom: 20px; font-size: 0.95rem; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; }
        
        .month-nav { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; background: var(--glass); padding: 8px; border-radius: 50px; border: 1px solid var(--glass-border); }
        .nav-btn { background: var(--accent); color: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="toast">⚠️ נא למלא תיאור וסכום תקין!</div>

<div class="modal-overlay" id="deleteModal">
    <div class="modal">
        <h3>למחוק את הפעולה?</h3>
        <p>הפעולה תימחק לצמיתות מהתקציב.</p>
        <div class="modal-btns">
            <button onclick="confirmDeleteAction()" class="modal-btn" style="background:var(--expense); color:white;">מחק</button>
            <button onclick="closeModal('deleteModal')" class="modal-btn" style="background:var(--glass-border); color:var(--text);">ביטול</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="refreshModal">
    <div class="modal">
        <div style="font-size: 2.5rem; margin-bottom: 15px;">🔄</div>
        <h3>לבדוק אם יש גרסה חדשה?</h3>
        <p>הדף יתרענן כדי למשוך את הקוד המעודכן ביותר. הנתונים השמורים שלך <b>לא</b> יימחקו.</p>
        <div class="modal-btns">
            <button onclick="confirmRefreshAction()" class="modal-btn" style="background:var(--accent); color:var(--bg);">רענן עכשיו</button>
            <button onclick="closeModal('refreshModal')" class="modal-btn" style="background:var(--glass-border); color:var(--text);">ביטול</button>
        </div>
    </div>
</div>

<div class="container">
    <header>
        <div class="header-icon">
            <svg viewBox="0 0 24 24" class="coin-svg" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M12 7v10M9 9h6M9 15h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </div>
        <h1>ניהול תקציב <span>ביתי</span></h1>
    </header>

    <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <h3 id="monthLabel" style="margin:0; font-size: 1.1rem;"></h3>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>

    <div class="summary-mini">
        <div class="mini-card"><span>הכנסות</span><b id="sumIncome" style="color: var(--income)">₪0</b></div>
        <div class="mini-card"><span>הוצאות</span><b id="sumExpense" style="color: var(--expense)">₪0</b></div>
        <div class="mini-card"><span>קבוע</span><b id="sumFixed" style="color: var(--fixed)">₪0</b></div>
        <div class="mini-card highlight"><span>יתרה</span><b id="sumBalance" style="color: var(--balance)">₪0</b></div>
    </div>

    <div class="chart-section">
        <div class="chart-container"><canvas id="budgetChart"></canvas></div>
    </div>

    <div class="form-card">
        <div class="input-group">
            <input type="text" id="desc" placeholder="תיאור (למשל: סופר)">
            <input type="number" id="amount" placeholder="סכום">
            <select id="type">
                <option value="income">💰 הכנסה</option>
                <option value="expense">💸 הוצאה</option>
                <option value="fixed">📅 קבוע</option>
            </select>
            <button class="btn-main" id="saveBtn" onclick="addEntry()">שמור</button>
        </div>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all', this)">הכל</button>
        <button class="filter-btn" onclick="setFilter('income', this)">הכנסות</button>
        <button class="filter-btn" onclick="setFilter('expense', this)">הוצאות</button>
        <button class="filter-btn" onclick="setFilter('fixed', this)">קבוע</button>
    </div>

    <div id="list" class="list-container"></div>

    <div class="actions-bottom">
        <button class="action-btn refresh" onclick="openRefreshModal()">🔄 בדוק עדכונים</button>
        <button class="action-btn" onclick="exportJSON()">💾 גיבוי</button>
        <button class="action-btn" onclick="exportCSV()">📊 ייצוא לאקסל</button>
        <button class="action-btn" onclick="document.getElementById('importFile').click()">🔄 מיזוג חכם</button>
        <input type="file" id="importFile" style="display:none" onchange="smartMerge(event)">
    </div>

    <footer style="text-align:center; padding: 30px; color: var(--text-dim); font-size: 0.75rem;">
        © אלכסנדר זבודיסקר 2026 © <br>
        <span style="opacity:0.6; font-size: 0.65rem;">גרסה v1.2</span>
    </footer>
</div>

<script>
    let entries = JSON.parse(localStorage.getItem('budget_alex_2026')) || [];
    let viewDate = new Date();
    let editId = null;
    let pendingDeleteId = null;
    let currentFilter = 'all';
    let myChart = null;

    // מודל רענון מודרני
    function openRefreshModal() {
        document.getElementById('refreshModal').style.display = 'flex';
    }

    function confirmRefreshAction() {
        location.reload(true); // reload true עוקף את הקאש של הדפדפן
    }

    // פונקציות מודלים כלליות
    function openDeleteModal(id) {
        pendingDeleteId = id;
        document.getElementById('deleteModal').style.display = 'flex';
    }

    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
        if(modalId === 'deleteModal') pendingDeleteId = null;
    }

    function confirmDeleteAction() {
        entries = entries.filter(e => e.id !== pendingDeleteId);
        save();
        closeModal('deleteModal');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        if(msg) t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function setFilter(type, btn) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function addEntry() {
        const descInput = document.getElementById('desc');
        const amountInput = document.getElementById('amount');
        const type = document.getElementById('type').value;
        if (!descInput.value.trim() || !amountInput.value || parseFloat(amountInput.value) <= 0) return showToast();

        if (editId) {
            const idx = entries.findIndex(e => e.id === editId);
            entries[idx] = { ...entries[idx], desc: descInput.value, amount: parseFloat(amountInput.value), type: type };
            editId = null;
            document.getElementById('saveBtn').innerText = "שמור";
        } else {
            entries.push({ id: Date.now(), desc: descInput.value, amount: parseFloat(amountInput.value), type, date: new Date(viewDate.getFullYear(), viewDate.getMonth(), 15).toISOString() });
        }
        descInput.value = ''; amountInput.value = '';
        save();
    }

    function editEntry(id) {
        const item = entries.find(e => e.id === id);
        document.getElementById('desc').value = item.desc;
        document.getElementById('amount').value = item.amount;
        document.getElementById('type').value = item.type;
        editId = id;
        document.getElementById('saveBtn').innerText = "עדכן";
        window.scrollTo({ top: 150, behavior: 'smooth' });
    }

    function save() { localStorage.setItem('budget_alex_2026', JSON.stringify(entries)); render(); }
    function changeMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); render(); }

    function render() {
        const months = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
        const m = viewDate.getMonth(), y = viewDate.getFullYear();
        document.getElementById('monthLabel').innerText = `${months[m]} ${y}`;

        const monthEntries = entries.filter(e => {
            const d = new Date(e.date);
            return d.getMonth() === m && d.getFullYear() === y;
        });

        const list = document.getElementById('list');
        list.innerHTML = '';
        let inc = 0, exp = 0, fix = 0;

        monthEntries.forEach(e => {
            if (e.type === 'income') inc += e.amount; 
            else if (e.type === 'expense') exp += e.amount;
            else fix += e.amount;
        });

        const filteredEntries = currentFilter === 'all' ? monthEntries : monthEntries.filter(e => e.type === currentFilter);
        const icons = { income: '💰', expense: '💸', fixed: '📅' };

        filteredEntries.sort((a,b) => b.id - a.id).forEach(e => {
            list.innerHTML += `
                <div class="item ${e.type}">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span>${icons[e.type]}</span>
                        <span>${e.desc}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div style="font-weight:700; font-family:monospace;">₪${e.amount.toLocaleString()}</div>
                        <div style="opacity:0.5; display:flex; gap:10px;">
                            <button onclick="editEntry(${e.id})" style="background:none; border:none; cursor:pointer;">✏️</button>
                            <button onclick="openDeleteModal(${e.id})" style="background:none; border:none; cursor:pointer;">🗑️</button>
                        </div>
                    </div>
                </div>`;
        });

        document.getElementById('sumIncome').innerText = `₪${inc.toLocaleString()}`;
        document.getElementById('sumExpense').innerText = `₪${exp.toLocaleString()}`;
        document.getElementById('sumFixed').innerText = `₪${fix.toLocaleString()}`;
        const bal = inc - (exp + fix);
        const balEl = document.getElementById('sumBalance');
        balEl.innerText = `₪${bal.toLocaleString()}`;
        balEl.style.color = bal >= 0 ? 'var(--balance)' : 'var(--expense)';
        updateChart(inc, exp, fix);
    }

    function updateChart(inc, exp, fix) {
        const ctx = document.getElementById('budgetChart').getContext('2d');
        if (myChart) myChart.destroy();
        const noData = inc === 0 && exp === 0 && fix === 0;
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['הכנסות', 'הוצאות', 'קבוע'],
                datasets: [{
                    data: noData ? [1] : [inc, exp, fix],
                    backgroundColor: noData ? ['#1e293b'] : ['#22c55e', '#ef4444', '#f59e0b'],
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '80%', animation: { animateRotate: true, duration: 600 } }
        });
    }

    function exportJSON() {
        const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `budget_backup_${new Date().toLocaleDateString()}.json`;
        a.click();
    }

    function exportCSV() {
        let csvContent = "\uFEFF תאריך,תיאור,סוג,סכום\n";
        entries.forEach(e => {
            const date = new Date(e.date).toLocaleDateString('he-IL');
            const typeHeb = e.type === 'income' ? 'הכנסה' : (e.type === 'expense' ? 'הוצאה' : 'קבוע');
            csvContent += `${date},${e.desc},${typeHeb},${e.amount}\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `תקציב_אלכסנדר_2026.csv`;
        a.click();
    }

    function smartMerge(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    let n = 0, u = 0;
                    imported.forEach(ne => {
                        const idx = entries.findIndex(old => old.id === ne.id);
                        if (idx !== -1) { entries[idx] = ne; u++; }
                        else { entries.push(ne); n++; }
                    });
                    save();
                    alert(`מיזוג הושלם!\nנוספו: ${n}, עודכנו: ${u}`);
                }
            } catch(err) { alert("שגיאה בקובץ."); }
        };
        reader.readAsText(file);
    }
    render();
</script>
</body>
</html>
