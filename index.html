<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ניהול כספי הבית - Premium Dark</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/6195/6195699.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-bg: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --income: #22c55e;
            --expense: #ef4444;
            --fixed: #f59e0b;
            --accent: #38bdf8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            max-width: 100%;
            overflow-x: hidden;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: rgba(15, 23, 42, 0.95); color: white; padding: 12px 25px; border-radius: 12px;
            backdrop-filter: blur(10px); z-index: 10000; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            font-weight: 600; pointer-events: none; border: 1px solid var(--glass-border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        #login-screen {
            position: fixed; inset: 0; background: var(--primary-bg);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .login-card {
            background: var(--glass-bg); backdrop-filter: blur(12px); padding: 40px; border-radius: 24px;
            text-align: center; border: 1px solid var(--glass-border); width: 85%; max-width: 340px;
        }
        .login-card input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; text-align: center; font-size: 20px; outline: none; }
        .login-card button { width: 100%; padding: 15px; background: var(--accent); color: var(--primary-bg); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        #app-content { display: none; padding: 15px; width: 100%; opacity: 0; transition: opacity 0.5s; }
        .container { max-width: 1100px; margin: 0 auto; }

        header { text-align: center; padding: 20px 0 30px 0; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .header-main { display: flex; align-items: center; gap: 12px; }
        h1 { font-size: 1.8rem; letter-spacing: 1px; font-weight: 800; background: linear-gradient(135deg, #fff 30%, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-line { width: 50px; height: 3px; background: var(--accent); border-radius: 10px; box-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }

        .month-nav { display: flex; justify-content: center; align-items: center; gap: 20px; background: var(--glass-bg); padding: 12px; border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--glass-border); }
        .nav-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; cursor: pointer; padding: 8px 18px; border-radius: 10px; transition: 0.2s; }
        .nav-btn:active { transform: scale(0.9); background: var(--accent); color: var(--primary-bg); }

        .grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } }

        .card { background: var(--glass-bg); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; border: 1px solid var(--glass-border); margin-bottom: 20px; position: relative; overflow: hidden; }
        .balance-val { font-size: 2.2rem; font-weight: 700; text-align: center; margin: 10px 0; transition: 0.3s; }
        
        .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .summary-item { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 14px; text-align: center; border: 1px solid var(--glass-border); }
        .summary-item span { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 4px; }

        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px; margin-bottom: 10px; background: rgba(255,255,255,0.02); border-radius: 14px; border-right: 4px solid #444; transition: 0.2s; }
        .item:hover { background: rgba(255,255,255,0.05); }
        .income { border-right-color: var(--income); }
        .expense { border-right-color: var(--expense); }
        .fixed { border-right-color: var(--fixed); }

        input, select { background: rgba(0,0,0,0.25); border: 1px solid var(--glass-border); color: white; padding: 14px; border-radius: 12px; width: 100%; margin-bottom: 12px; font-family: inherit; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent); background: rgba(0,0,0,0.4); }
        .btn-submit { background: var(--accent); color: var(--primary-bg); font-weight: bold; padding: 14px; border-radius: 12px; width: 100%; cursor: pointer; border: none; font-size: 1rem; transition: 0.2s; }
        .btn-submit:active { transform: scale(0.98); opacity: 0.9; }
        
        .progress-bg { background: rgba(0,0,0,0.3); border-radius: 20px; height: 10px; margin: 12px 0; }
        .progress-fill { height: 100%; border-radius: 20px; background: var(--fixed); transition: 0.8s cubic-bezier(0.075, 0.82, 0.165, 1); width: 0%; }
        
        .scroll-area { max-height: 450px; overflow-y: auto; padding-right: 5px; }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .action-btn { background: none; border: none; cursor: pointer; padding: 5px; border-radius: 8px; transition: 0.2s; }
        .action-btn:hover { background: rgba(255,255,255,0.1); }

        footer { text-align: center; color: var(--text-dim); font-size: 12px; padding: 40px; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div id="toast">⚠️ <span></span></div>

<div id="login-screen">
    <div class="login-card">
        <div style="font-size: 3rem; margin-bottom: 10px;">🔐</div>
        <h2>כניסה למערכת</h2>
        <p style="color:var(--text-dim); font-size:0.85rem; margin-top:5px;">הזן סיסמה כדי להמשיך</p>
        <input type="password" id="pass-input" placeholder="סיסמה" autocomplete="current-password">
        <button onclick="checkLogin()">התחברות</button>
    </div>
</div>

<div id="app-content">
    <div class="container">
        <header>
            <div class="header-main">
                <span style="font-size: 1.8rem; filter: drop-shadow(0 0 8px var(--accent));">📊</span>
                <h1>ניהול כספי הבית</h1>
            </div>
            <div class="header-line"></div>
        </header>

        <div class="month-nav">
            <button class="nav-btn" onclick="moveMonth(-1)">◀</button>
            <span id="monthTitle" style="font-weight: 700; min-width: 120px; text-align: center;"></span>
            <button class="nav-btn" onclick="moveMonth(1)">▶</button>
        </div>

        <div class="grid">
            <aside>
                <div class="card">
                    <div style="text-align:center; color:var(--text-dim); font-size:0.85rem; font-weight: 600;">יתרה חודשית</div>
                    <div id="balanceVal" class="balance-val">₪ 0</div>
                    <div style="text-align:center; border-top:1px solid var(--glass-border); padding-top:12px; font-size:0.85rem; color: var(--text-dim);">
                        יתרה מצטברת: <b id="totalAccumulated" style="color: var(--text-main)">₪ 0</b>
                    </div>
                </div>

                <div class="summary">
                    <div class="summary-item"><span>הכנסות 💰</span><b id="totalIncome" style="color:var(--income)">₪0</b></div>
                    <div class="summary-item"><span>הוצאות 💸</span><b id="totalExpense" style="color:var(--expense)">₪0</b></div>
                </div>

                <div class="card">
                    <h3 id="formTitle" style="font-size: 1.1rem;">הוספת תנועה</h3><br>
                    <input type="text" id="desc" placeholder="תיאור (למשל: סופר, משכורת)">
                    <input type="number" id="amt" placeholder="סכום" inputmode="decimal">
                    <select id="type">
                        <option value="income">💰 הכנסה</option>
                        <option value="expense">💸 הוצאה</option>
                        <option value="fixed">📅 קבועה</option>
                    </select>
                    <button class="btn-submit" id="submitBtn" onclick="addItem()">הוסף למערכת</button>
                </div>

                <div class="card">
                    <h3 style="font-size: 0.9rem; color: var(--text-dim);">נטל קבוע 📅: <b id="fixedText" style="color: var(--fixed)">0%</b></h3>
                    <div class="progress-bg"><div id="fixedProgress" class="progress-fill"></div></div>
                    <div style="height:150px; margin-top: 10px;"><canvas id="mainChart"></canvas></div>
                    <div style="display:flex; gap:8px; margin-top:20px;">
                        <button onclick="exportData()" style="flex:1; background:none; border:1px solid var(--glass-border); color:var(--text-dim); font-size:11px; padding:8px; cursor:pointer; border-radius:8px;">גיבוי נתונים</button>
                        <button onclick="document.getElementById('fileIn').click()" style="flex:1; background:none; border:1px solid var(--glass-border); color:var(--text-dim); font-size:11px; padding:8px; cursor:pointer; border-radius:8px;">שחזור</button>
                        <input type="file" id="fileIn" style="display:none" onchange="importData(event)">
                    </div>
                </div>
            </aside>

            <main>
                <div class="card">
                    <h3 style="font-size: 1.1rem;">פירוט תנועות - <span id="labelMonth" style="color:var(--accent)"></span></h3><br>
                    <div id="list" class="scroll-area"></div>
                </div>
                <div class="card">
                    <h3 style="font-size: 1.1rem; margin-bottom: 15px;">מגמה שנתית</h3>
                    <div style="height: 250px;"><canvas id="monthlyChart"></canvas></div>
                </div>
            </main>
        </div>
        <footer>© 2026 אלכסנדר זבודיסקר</footer>
    </div>
</div>

<script>
let data = [];
try {
    const saved = localStorage.getItem('budget_db');
    data = saved ? JSON.parse(saved) : [];
} catch (e) {
    data = [];
}

let viewDate = new Date();
let mainChart, monthlyChart;
let editingId = null;
const icons = { income: '💰', expense: '💸', fixed: '📅' };

function showToast(msg, isError = true) {
    const t = document.getElementById('toast');
    t.querySelector('span').innerText = msg;
    t.style.borderRight = isError ? '4px solid #ef4444' : '4px solid #22c55e';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// תיקון פונקציית הכניסה להבטחת טעינת גרפים
function checkLogin() {
    const pass = document.getElementById("pass-input").value;
    if (pass === "0000") {
        const ls = document.getElementById("login-screen");
        const ac = document.getElementById("app-content");
        ls.style.opacity = "0";
        setTimeout(() => {
            ls.style.display = "none";
            ac.style.display = "block";
            setTimeout(() => {
                ac.style.opacity = "1";
                // קודם יוצרים את הגרפים ורק אז מרנדרים נתונים
                initCharts(); 
                render();
            }, 100);
        }, 500);
    } else { 
        showToast("סיסמה שגויה, נסה שוב"); 
    }
}

document.getElementById('pass-input').addEventListener('keypress', (e) => { if(e.key==='Enter') checkLogin(); });

function initCharts() {
    const canvas1 = document.getElementById('mainChart');
    const canvas2 = document.getElementById('monthlyChart');
    
    if(!canvas1 || !canvas2) return;

    if(mainChart) mainChart.destroy();
    mainChart = new Chart(canvas1.getContext('2d'), {
        type: 'doughnut',
        data: { labels: ['הכנסה', 'הוצאה', 'קבועה'], datasets: [{ data: [0,0,0], backgroundColor: ['#22c55e','#ef4444','#f59e0b'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display:false } }, cutout: '75%' }
    });

    if(monthlyChart) monthlyChart.destroy();
    monthlyChart = new Chart(canvas2.getContext('2d'), {
        type: 'bar',
        data: { labels: [], datasets: [
            { label:'הכנסה', backgroundColor:'#22c55e', data:[], borderRadius: 4 },
            { label:'הוצאה', backgroundColor:'#ef4444', data:[], borderRadius: 4 },
            { label:'קבועה', backgroundColor:'#f59e0b', data:[], borderRadius: 4 }
        ]},
        options: { 
            responsive:true, 
            maintainAspectRatio: false, 
            scales: { 
                y: { stacked:true, beginAtZero:true, grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'#94a3b8', font:{size:10}} }, 
                x: { stacked:true, grid:{display:false}, ticks:{color:'#94a3b8', font:{size:10}} } 
            }, 
            plugins:{ legend:{ position: 'bottom', labels:{color:'#94a3b8', boxWidth:12, font:{size:11}} } } 
        }
    });
}

function addItem() {
    const d = document.getElementById('desc'), a = document.getElementById('amt'), t = document.getElementById('type');
    const amount = parseFloat(a.value);
    if (!d.value.trim() || isNaN(amount) || amount <= 0) {
        showToast("נא למלא תיאור וסכום תקין");
        return;
    }
    if(editingId){
        const idx = data.findIndex(x=>x.id===editingId);
        if(idx !== -1) {
            data[idx] = {...data[idx], desc: d.value, amt: amount, type: t.value};
            editingId = null;
            document.getElementById('submitBtn').innerText = "הוסף למערכת";
            document.getElementById('formTitle').innerText = "הוספת תנועה";
        }
    } else {
        data.push({ id: Date.now(), desc: d.value.trim(), amt: amount, type: t.value, date: viewDate.toISOString() });
    }
    d.value = ''; a.value = '';
    save();
}

function deleteItem(id) { 
    if(confirm('למחוק?')) { data = data.filter(x=>x.id!==id); save(); } 
}

function editItem(id) {
    const item = data.find(x=>x.id===id);
    if(!item) return;
    document.getElementById('desc').value = item.desc; 
    document.getElementById('amt').value = item.amt; 
    document.getElementById('type').value = item.type;
    editingId = id; 
    document.getElementById('submitBtn').innerText = "עדכן שינויים";
    document.getElementById('formTitle').innerText = "עריכת תנועה";
}

function moveMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); render(); }

function save() { 
    localStorage.setItem('budget_db', JSON.stringify(data)); 
    render(); 
}

function render() {
    const months = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
    const m = viewDate.getMonth(), y = viewDate.getFullYear();
    document.getElementById('monthTitle').innerText = `${months[m]} ${y}`;
    document.getElementById('labelMonth').innerText = months[m];

    const currentData = data.filter(x => { 
        const d = new Date(x.date); 
        return d.getMonth() === m && d.getFullYear() === y; 
    });

    const list = document.getElementById('list');
    list.innerHTML = '';
    let totals = {income:0, expense:0, fixed:0};

    currentData.sort((a,b) => b.id - a.id).forEach(x => {
        totals[x.type] += x.amt;
        const div = document.createElement('div');
        div.className = `item ${x.type}`;
        div.innerHTML = `<span>${icons[x.type]} ${x.desc}</span><div><b>₪${x.amt.toLocaleString()}</b> <button class="action-btn" onclick="editItem(${x.id})">✏️</button> <button class="action-btn" onclick="deleteItem(${x.id})">🗑️</button></div>`;
        list.appendChild(div);
    });

    const net = totals.income - (totals.expense + totals.fixed);
    document.getElementById('totalIncome').innerText = `₪${totals.income.toLocaleString()}`;
    document.getElementById('totalExpense').innerText = `₪${(totals.expense + totals.fixed).toLocaleString()}`;
    const balEl = document.getElementById('balanceVal');
    balEl.innerText = `₪${net.toLocaleString()}`;
    balEl.style.color = net >= 0 ? 'var(--income)' : 'var(--expense)';

    const acc = data.reduce((sum, x) => {
        const d = new Date(x.date);
        return (d.getFullYear() < y || (d.getFullYear() === y && d.getMonth() <= m)) ? (x.type === 'income' ? sum + x.amt : sum - x.amt) : sum;
    }, 0);
    document.getElementById('totalAccumulated').innerText = `₪${acc.toLocaleString()}`;

    if(mainChart) { 
        mainChart.data.datasets[0].data = [totals.income, totals.expense, totals.fixed]; 
        mainChart.update();
    }

    const fixP = totals.income > 0 ? Math.floor((totals.fixed / totals.income) * 100) : 0;
    document.getElementById('fixedText').innerText = fixP + '%';
    document.getElementById('fixedProgress').style.width = Math.min(fixP, 100) + '%';

    const yearlyStats = Array.from({length: 12}, () => ({inc:0, exp:0, fix:0}));
    data.forEach(x => {
        const d = new Date(x.date);
        if(d.getFullYear() === y) {
            const mo = d.getMonth();
            if(x.type === 'income') yearlyStats[mo].inc += x.amt;
            else if(x.type === 'expense') yearlyStats[mo].exp += x.amt;
            else if(x.type === 'fixed') yearlyStats[mo].fix += x.amt;
        }
    });

    if(monthlyChart) { 
        monthlyChart.data.labels = months; 
        monthlyChart.data.datasets[0].data = yearlyStats.map(s => s.inc); 
        monthlyChart.data.datasets[1].data = yearlyStats.map(s => s.exp); 
        monthlyChart.data.datasets[2].data = yearlyStats.map(s => s.fix); 
        monthlyChart.update(); 
    }
}

function exportData(){
    const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `budget_backup.json`;
    a.click();
}

function importData(e){
    const r = new FileReader();
    r.onload = (ev) => { try { data = JSON.parse(ev.target.result); save(); } catch(err) { alert('טעות בקובץ'); } };
    r.readAsText(e.target.files[0]);
}
</script>
</body>
</html>
