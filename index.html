<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול כספי הבית - אלכסנדר</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f9fafc;
            --card-bg: #ffffff;
            --primary: #2c3e50;
            --income: #27ae60;
            --expense: #e74c3c;
            --fixed: #f39c12;
            --border-color: #ddd;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0; color: #333;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* מסך כניסה */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary); display: flex; justify-content: center; align-items: center;
            z-index: 9999; color: white;
        }

        .login-card {
            background: white; padding: 30px; border-radius: 15px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); color: #333; width: 300px;
        }

        .login-card img { width: 80px; margin-bottom: 20px; }
        .login-card h2 { margin-bottom: 20px; font-size: 1.4rem; color: var(--primary); }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 18px; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 12px; background: var(--income); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .login-card button:hover { opacity: 0.9; }
        #error-msg { color: var(--expense); font-size: 14px; margin-top: 10px; display: none; }

        /* תוכן האפליקציה - מוסתר בהתחלה */
        #app-content { display: none; padding: 10px; }

        /* עיצוב האפליקציה (כמו בגרסה הקודמת) */
        .container { max-width: 1200px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; }
        header { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 10px 0; }
        .header-icon { width: 35px; height: 35px; }
        h1 { margin: 0; font-size: 1.6rem; color: var(--primary); }
        .month-nav { display: flex; justify-content: center; align-items: center; gap: 20px; background: var(--primary); color: white; padding: 8px; border-radius: 8px; margin-bottom: 10px; }
        .nav-btn { background: rgba(255,255,255,0.2); border: none; color: white; cursor: pointer; padding: 5px 15px; border-radius: 4px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 320px 1fr; gap: 15px; flex-grow: 1; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 10px; }
        .card h3 { margin: 0 0 12px 0; font-size: 1rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .balance-display { border: 2px solid var(--primary); text-align: center; padding: 10px; border-radius: 12px; margin-bottom: 15px; background: white; }
        .balance-val { font-size: 1.4rem; font-weight: bold; display: block; }
        .carry-over { font-size: 0.9rem; color: #666; margin-top: 5px; border-top: 1px dashed #eee; padding-top: 5px; }
        .summary { display:flex; justify-content: space-between; margin-bottom:10px; font-size: 13px; background: #fff; padding: 10px; border-radius: 8px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        input, select, button { padding: 8px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; }
        .btn-submit { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        .scroll-area { flex-grow: 1; overflow-y: auto; max-height: 400px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px; margin-bottom: 5px; background: #fefefe; border-radius: 8px; border-right: 5px solid #ccc; font-size: 13px; }
        .income { border-right-color: var(--income); }
        .expense { border-right-color: var(--expense); }
        .fixed { border-right-color: var(--fixed); }
        .progress-bg { background: #eee; border-radius: 10px; height: 8px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; transition: width 0.6s ease; background: var(--fixed); }
        .chart-box { position: relative; width: 100%; }
        footer { text-align: center; font-size: 11px; color: #888; padding: 20px 10px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .summary { flex-direction: column; } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <img src="https://cdn-icons-png.flaticon.com/512/6195/6195699.png" alt="Lock Icon">
        <h2>כניסה למערכת</h2>
        <input type="password" id="pass-input" placeholder="הקש סיסמה" autofocus>
        <button onclick="checkLogin()">התחברות</button>
        <p id="error-msg">סיסמה שגויה, נסה שוב</p>
    </div>
</div>

<div id="app-content" class="container">
    <header>
        <img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" class="header-icon">
        <h1>ניהול כספי הבית</h1>
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135706.png" class="header-icon">
    </header>

    <div class="month-nav">
        <button class="nav-btn" onclick="moveMonth(-1)">◀</button>
        <span id="monthTitle" style="font-weight: bold; min-width: 120px; text-align: center;"></span>
        <button class="nav-btn" onclick="moveMonth(1)">▶</button>
    </div>

    <div class="grid">
        <aside>
            <div class="balance-display">
                <span style="font-size: 0.8rem; color: #666;">יתרת חודש נוכחי</span>
                <span id="balanceVal" class="balance-val">₪ 0</span>
                <div class="carry-over">
                    יתרה מצטברת: <span id="totalAccumulated" style="font-weight:bold">₪ 0</span>
                </div>
            </div>

            <div class="summary">
                <div>הכנסות: <span id="totalIncome" style="color:var(--income)">₪0</span></div>
                <div>הוצאות: <span id="totalExpense" style="color:var(--expense)">₪0</span></div>
                <div>נטו: <span id="netBalance">₪0</span></div>
            </div>

            <div class="card">
                <h3>הוספה / עריכת תנועה</h3>
                <div class="form-grid">
                    <input type="text" id="desc" placeholder="תיאור" class="full-width">
                    <input type="number" id="amt" placeholder="סכום">
                    <select id="type">
                        <option value="income">הכנסה</option>
                        <option value="expense">הוצאה</option>
                        <option value="fixed">קבועה</option>
                    </select>
                    <button class="btn-submit full-width" id="submitBtn" onclick="addItem()">הוסף תנועה</button>
                </div>
            </div>

            <div class="card">
                <h3>ניתוח נטל קבוע</h3>
                <div style="font-size: 12px;">
                    אחוז מההכנסה: <span id="fixedText" style="font-weight:bold">0%</span>
                    <div class="progress-bg"><div id="fixedProgress" class="progress-fill"></div></div>
                </div>
                <div class="chart-box" style="height:140px;"><canvas id="mainChart"></canvas></div>
                <div style="display:flex; gap:5px; margin-top:15px;">
                    <button onclick="exportData()" style="flex:1; font-size:10px; cursor:pointer;">גיבוי JSON</button>
                    <button onclick="document.getElementById('fileIn').click()" style="flex:1; font-size:10px; cursor:pointer;">שחזור</button>
                    <input type="file" id="fileIn" style="display:none" onchange="importData(event)">
                </div>
            </div>
        </aside>

        <main class="list-section">
            <div class="card" style="display: flex; flex-direction: column;">
                <h3>פירוט תנועות - <span id="labelMonth"></span></h3>
                <div id="list" class="scroll-area"></div>
            </div>
            
            <div class="card">
                <h3>מבט שנתי (השוואת חודשים)</h3>
                <div class="chart-box" style="height: 220px;"><canvas id="monthlyChart"></canvas></div>
            </div>
        </main>
    </div>

    <footer>&copy; 2026 אלכסנדר זבודיסקר</footer>
</div>

<script>
// --- פונקציית כניסה ---
function checkLogin() {
    const passInput = document.getElementById("pass-input").value;
    if (passInput === "0000") {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app-content").style.display = "block";
        initCharts();
        render();
    } else {
        document.getElementById("error-msg").style.display = "block";
        document.getElementById("pass-input").value = "";
    }
}

// תמיכה בלחיצה על Enter במקלדת לכניסה
document.getElementById("pass-input").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        checkLogin();
    }
});

// --- לוגיקה של האפליקציה ---
let data = JSON.parse(localStorage.getItem('budget_db')) || [];
let viewDate = new Date();
let mainChart, monthlyChart;
let editingId = null;

function initCharts() {
    mainChart = new Chart(document.getElementById('mainChart'), {
        type: 'doughnut',
        data: { labels: ['הכנסה', 'הוצאה', 'קבועה'], datasets: [{ data: [0,0,0], backgroundColor: ['#27ae60','#e74c3c','#f39c12'], borderWidth: 1 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } }, cutout: '70%' }
    });

    monthlyChart = new Chart(document.getElementById('monthlyChart'), {
        type: 'bar',
        data: { labels: [], datasets: [
            { label:'הכנסה', backgroundColor:'#27ae60', data:[] },
            { label:'הוצאה', backgroundColor:'#e74c3c', data:[] },
            { label:'קבועה', backgroundColor:'#f39c12', data:[] }
        ]},
        options: { 
            responsive:true, maintainAspectRatio: false, 
            plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, font:{size:10} } } }, 
            scales:{ y:{ beginAtZero:true, stacked: true }, x:{ stacked: true } } 
        }
    });
}

function addItem() {
    const d = document.getElementById('desc'), a = document.getElementById('amt'), t = document.getElementById('type');
    const amtVal = parseFloat(a.value);
    if(!d.value || isNaN(amtVal) || amtVal <= 0){ alert('נא להזין תיאור וסכום תקין'); return; }

    if(editingId){
        const item = data.find(i=>i.id===editingId);
        if(item) { item.desc = d.value; item.amt = amtVal; item.type = t.value; }
        editingId = null;
        document.getElementById('submitBtn').innerText = "הוסף תנועה";
    } else {
        data.push({ id: Date.now(), desc:d.value, amt:amtVal, type:t.value, date:viewDate.toISOString() });
    }
    d.value=''; a.value='';
    save();
}

function editItem(id){
    const item = data.find(i=>i.id===id);
    if(!item) return;
    document.getElementById('desc').value = item.desc;
    document.getElementById('amt').value = item.amt;
    document.getElementById('type').value = item.type;
    document.getElementById('submitBtn').innerText = "עדכן תנועה";
    editingId = id;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function deleteItem(id){
    if(!confirm('למחוק את התנועה הזו?')) return;
    data = data.filter(i=>i.id!==id);
    save();
}

function moveMonth(n){ 
    viewDate.setMonth(viewDate.getMonth()+n); 
    editingId = null;
    document.getElementById('desc').value = '';
    document.getElementById('amt').value = '';
    document.getElementById('submitBtn').innerText = "הוסף תנועה";
    render(); 
}

function save(){ localStorage.setItem('budget_db',JSON.stringify(data)); render(); }

function render(){
    const months=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
    const m=viewDate.getMonth(), y=viewDate.getFullYear();
    document.getElementById('monthTitle').innerText=`${months[m]} ${y}`;
    document.getElementById('labelMonth').innerText=months[m];

    const currentData = data.filter(i=>{ const d=new Date(i.date); return d.getMonth()===m && d.getFullYear()===y; });
    const list=document.getElementById('list');
    list.innerHTML='';
    
    let totals={income:0,expense:0,fixed:0};
    currentData.slice().sort((a,b)=>b.id-a.id).forEach(i=>{
        totals[i.type]+=i.amt;
        const itemDiv = document.createElement('div');
        itemDiv.className = `item ${i.type}`;
        itemDiv.innerHTML = `<span>${i.desc}</span><div style="display:flex;align-items:center;gap:10px;"><span dir="ltr" style="font-weight:bold">${i.type==='income'?'+':'-'} ₪${i.amt.toLocaleString()}</span><button onclick="editItem(${i.id})" style="border:none;background:none;cursor:pointer;">✏️</button><button onclick="deleteItem(${i.id})" style="border:none;background:none;cursor:pointer;color:#ddd;">🗑</button></div>`;
        list.appendChild(itemDiv);
    });

    const currentBal = totals.income-(totals.expense+totals.fixed);
    document.getElementById('balanceVal').innerText=`₪ ${currentBal.toLocaleString()}`;
    document.getElementById('balanceVal').style.color=currentBal < 0 ? 'var(--expense)' : 'var(--income)';

    const accumulatedBal = data.reduce((acc,i)=>{
        const d=new Date(i.date);
        const itemMonth=d.getMonth() + (d.getFullYear()*12);
        const viewMonth=m+(y*12);
        return (itemMonth <= viewMonth) ? (i.type==='income'?acc+i.amt:acc-i.amt) : acc;
    },0);
    document.getElementById('totalAccumulated').innerText=`₪ ${accumulatedBal.toLocaleString()}`;
    document.getElementById('totalAccumulated').style.color=accumulatedBal<0?'var(--expense)':'var(--income)';

    document.getElementById('totalIncome').innerText=`₪${totals.income.toLocaleString()}`;
    document.getElementById('totalExpense').innerText=`₪${(totals.expense+totals.fixed).toLocaleString()}`;
    document.getElementById('netBalance').innerText=`₪${currentBal.toLocaleString()}`;

    if(mainChart){ mainChart.data.datasets[0].data=[totals.income,totals.expense,totals.fixed]; mainChart.update(); }
    const fixP = totals.income > 0 ? Math.floor((totals.fixed/totals.income)*100) : 0;
    document.getElementById('fixedText').innerText=fixP+'%';
    document.getElementById('fixedProgress').style.width=Math.min(fixP,100)+'%';

    const monthLabels=[]; const incomeData=[]; const expenseData=[]; const fixedData=[];
    for(let i=0; i<12; i++){
        monthLabels.push(months[i]);
        const mItems=data.filter(d=> { const dt=new Date(d.date); return dt.getMonth()===i && dt.getFullYear()===y; });
        let inc=0, exp=0, fix=0;
        mItems.forEach(it=>{ if(it.type==='income') inc+=it.amt; else if(it.type==='expense') exp+=it.amt; else if(it.type==='fixed') fix+=it.amt; });
        incomeData.push(inc); expenseData.push(exp); fixedData.push(fix);
    }
    if(monthlyChart){
        monthlyChart.data.labels=monthLabels;
        monthlyChart.data.datasets[0].data=incomeData;
        monthlyChart.data.datasets[1].data=expenseData;
        monthlyChart.data.datasets[2].data=fixedData;
        monthlyChart.update();
    }
}

function exportData(){
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([JSON.stringify(data)], {type:"application/json"}));
    a.download="budget_backup.json"; a.click();
}
function importData(e){
    const r=new FileReader();
    r.onload=(ev)=>{ try{ data=JSON.parse(ev.target.result); save(); } catch(e){ alert('קובץ לא תקין'); } };
    r.readAsText(e.target.files[0]);
}
</script>

</body>
</html>
