<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ניהול כספי הבית - אלקסנדר</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-bg: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --income: #22c55e;
            --expense: #ef4444;
            --fixed: #f59e0b;
            --accent: #38bdf8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* מסך כניסה */
        #login-screen {
            position: fixed; inset: 0; background: var(--primary-bg);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-card {
            background: var(--glass-bg); backdrop-filter: blur(15px); padding: 40px; border-radius: 28px;
            border: 1px solid var(--glass-border); width: 85%; max-width: 350px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .login-card img { filter: drop-shadow(0 0 10px var(--accent)); margin-bottom: 20px; }
        .login-card input { 
            width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; 
            border: 1px solid var(--glass-border); background: rgba(0,0,0,0.4); 
            color: white; text-align: center; font-size: 24px; outline: none;
        }
        .login-card button { 
            width: 100%; padding: 15px; background: var(--accent); color: var(--primary-bg); 
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px;
        }

        /* תוכן האפליקציה */
        #app-content { display: none; padding: 15px; max-width: 1100px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0; }
        h1 { font-size: 1.8rem; background: linear-gradient(to left, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .month-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--glass-bg); padding: 15px; border-radius: 18px; 
            margin-bottom: 20px; border: 1px solid var(--glass-border); 
        }
        .nav-btn { background: rgba(255,255,255,0.08); border: none; color: white; cursor: pointer; padding: 10px 18px; border-radius: 10px; font-size: 18px; }

        .grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } }

        .card { background: var(--glass-bg); backdrop-filter: blur(10px); padding: 20px; border-radius: 22px; border: 1px solid var(--glass-border); margin-bottom: 20px; }
        .balance-val { font-size: 2.3rem; font-weight: 800; text-align: center; margin: 10px 0; }
        
        .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .summary-item { background: rgba(0,0,0,0.25); padding: 15px; border-radius: 16px; text-align: center; border: 1px solid var(--glass-border); }
        .summary-item span { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 4px; }

        .item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 16px; margin-bottom: 12px; background: rgba(255,255,255,0.04); 
            border-radius: 15px; border-right: 5px solid #444; 
        }
        .income { border-right-color: var(--income); }
        .expense { border-right-color: var(--expense); }
        .fixed { border-right-color: var(--fixed); }

        input, select { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: white; padding: 14px; border-radius: 12px; width: 100%; margin-bottom: 12px; outline: none; }
        .btn-submit { background: var(--accent); color: var(--primary-bg); font-weight: bold; padding: 14px; border-radius: 12px; width: 100%; cursor: pointer; border: none; }
        
        .scroll-area { max-height: 400px; overflow-y: auto; }
        .type-icon { margin-left: 10px; font-size: 1.2rem; }
        
        footer { text-align: center; color: var(--text-dim); font-size: 12px; padding: 40px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <img src="https://cdn-icons-png.flaticon.com/512/6195/6195699.png" width="80">
        <h2 style="color:white">כניסה למערכת</h2>
        <input type="password" id="pass-input" placeholder="סיסמה">
        <button onclick="checkLogin()">פתיחה</button>
    </div>
</div>

<div id="app-content">
    <header><h1>ניהול כספי הבית</h1></header>
    
    <div class="month-nav">
        <button class="nav-btn" onclick="moveMonth(-1)">◀</button>
        <h2 id="monthTitle" style="font-size: 1.1rem;"></h2>
        <button class="nav-btn" onclick="moveMonth(1)">▶</button>
    </div>

    <div class="grid">
        <aside>
            <div class="card">
                <div style="text-align:center; color:var(--text-dim); font-size:0.8rem;">יתרה חודשית</div>
                <div id="balanceVal" class="balance-val">₪ 0</div>
                <div style="text-align:center; border-top:1px solid var(--glass-border); padding-top:10px; font-size:0.8rem;">
                    יתרה מצטברת: <b id="totalAccumulated">₪ 0</b>
                </div>
            </div>

            <div class="summary">
                <div class="summary-item"><span>הכנסות 💰</span><b id="totalIncome" style="color:var(--income)">₪0</b></div>
                <div class="summary-item"><span>הוצאות 💸</span><b id="totalExpense" style="color:var(--expense)">₪0</b></div>
            </div>

            <div class="card">
                <h3>הוספת תנועה</h3><br>
                <input type="text" id="desc" placeholder="תיאור">
                <input type="number" id="amt" placeholder="סכום">
                <select id="type">
                    <option value="income">💰 הכנסה</option>
                    <option value="expense">💸 הוצאה</option>
                    <option value="fixed">📅 קבועה</option>
                </select>
                <button class="btn-submit" onclick="addItem()">בצע</button>
            </div>
        </aside>

        <main>
            <div class="card">
                <h3>פירוט תנועות - <span id="labelMonth" style="color:var(--accent)"></span></h3>
                <div id="list" class="scroll-area" style="margin-top:15px;"></div>
            </div>
            <div class="card">
                <h3>מגמה שנתית</h3>
                <div style="height: 250px;"><canvas id="monthlyChart"></canvas></div>
            </div>
        </main>
    </div>
    <footer>&copy; 2026 אלכסנדר זבודיסקר</footer>
</div>

<script>
let data = JSON.parse(localStorage.getItem('budget_db')) || [];
let viewDate = new Date();
let monthlyChart = null;

const icons = { income: '💰', expense: '💸', fixed: '📅' };

function checkLogin() {
    if (document.getElementById("pass-input").value === "0000") {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app-content").style.display = "block";
        initCharts(); render();
    } else { alert("סיסמה שגויה"); }
}

function initCharts() {
    const ctx = document.getElementById('monthlyChart').getContext('2d');
    if(monthlyChart) monthlyChart.destroy();
    monthlyChart = new Chart(ctx, {
        type: 'bar',
        data: { labels: [], datasets: [
            { label:'הכנסה', backgroundColor:'#22c55e', data:[] },
            { label:'הוצאה', backgroundColor:'#ef4444', data:[] },
            { label:'קבועה', backgroundColor:'#f59e0b', data:[] }
        ]},
        options: { responsive:true, maintainAspectRatio: false, scales: { y: { stacked:true }, x: { stacked:true } } }
    });
}

function addItem() {
    const d = document.getElementById('desc'), a = document.getElementById('amt'), t = document.getElementById('type');
    if (!d.value || !a.value) return;
    data.push({ id: Date.now(), desc: d.value, amt: parseFloat(a.value), type: t.value, date: viewDate.toISOString() });
    d.value=''; a.value=''; save();
}

function deleteItem(id) { if(confirm('למחוק?')) { data = data.filter(x=>x.id!==id); save(); } }
function save() { localStorage.setItem('budget_db', JSON.stringify(data)); render(); }
function moveMonth(n) { viewDate.setMonth(viewDate.getMonth()+n); render(); }

function render() {
    const months = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
    const m = viewDate.getMonth(), y = viewDate.getFullYear();
    document.getElementById('monthTitle').innerText = `${months[m]} ${y}`;
    document.getElementById('labelMonth').innerText = months[m];

    const currentData = data.filter(x => { const d = new Date(x.date); return d.getMonth()===m && d.getFullYear()===y; });
    const list = document.getElementById('list');
    list.innerHTML = '';
    let totals = {income:0, expense:0, fixed:0};

    currentData.sort((a,b)=>b.id-a.id).forEach(x => {
        totals[x.type] += x.amt;
        const div = document.createElement('div');
        div.className = `item ${x.type}`;
        div.innerHTML = `<span><span class="type-icon">${icons[x.type]}</span>${x.desc}</span><div style="display:flex; gap:10px;"><b>₪${x.amt.toLocaleString()}</b><button onclick="deleteItem(${x.id})" style="background:none; border:none; cursor:pointer;">🗑️</button></div>`;
        list.appendChild(div);
    });

    const net = totals.income - (totals.expense + totals.fixed);
    document.getElementById('totalIncome').innerText = `₪${totals.income.toLocaleString()}`;
    document.getElementById('totalExpense').innerText = `₪${(totals.expense + totals.fixed).toLocaleString()}`;
    document.getElementById('balanceVal').innerText = `₪${net.toLocaleString()}`;
    document.getElementById('balanceVal').style.color = net >= 0 ? 'var(--income)' : 'var(--expense)';

    // יתרה מצטברת
    const acc = data.reduce((sum, x) => (x.type==='income' ? sum+x.amt : sum-x.amt), 0);
    document.getElementById('totalAccumulated').innerText = `₪${acc.toLocaleString()}`;

    // עדכון גרף
    const incD=[], expD=[], fixD=[];
    for(let i=0; i<12; i++) {
        const mData = data.filter(x => new Date(x.date).getMonth()===i && new Date(x.date).getFullYear()===y);
        incD.push(mData.filter(x=>x.type==='income').reduce((s,x)=>s+x.amt,0));
        expD.push(mData.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amt,0));
        fixD.push(mData.filter(x=>x.type==='fixed').reduce((s,x)=>s+x.amt,0));
    }
    if(monthlyChart) { monthlyChart.data.labels=months; monthlyChart.data.datasets[0].data=incD; monthlyChart.data.datasets[1].data=expD; monthlyChart.data.datasets[2].data=fixD; monthlyChart.update(); }
}
</script>
</body>
</html>
